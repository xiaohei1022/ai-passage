spring:
  application:
    name: ai-passage
  profiles:
    active: local
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  # MySQL 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_passage
    username: root
    password: root
  # Redis 配置
  data:
    redis:
      host: 127.0.0.1
      port: 16379
      database: 0
      password:
mybatis-flex:
  configuration:
    map-underscore-to-camel-case: false
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
# Knife4j配置
# springdoc-openapi配置
springdoc:
  # get请求多参数时不需要添加额外的@ParameterObject和@Parameter注解
  default-flat-param-object: true
  # 启用swaggerUI
  swagger-ui:
    #自定义swagger前端请求路径，输入http：127.0.0.1:8080/swagger-ui.html会自动重定向到swagger页面
    path: /swagger-ui.html
    enabled: true
    #    tags-sorter: alpha # 标签的排序方式 alpha:按照子母顺序排序（@ApiSupport注解排序不生效，因此需要设置）
    #    operations-sorter: alpha # 接口的排序方式 alpha:按照子母顺序排序（@ApiOperationSupport注解排序生效，因此这里不作设置）
    operations-sorter: order # 设置规则为order，该规则会使用Knife4j的增强排序扩展规则`x-order`
  # 启用文档，默认开启
  api-docs:
    path: /v3/api-docs    #swagger后端请求地址
    enabled: true
# knife4j相关配置 可以不用改
knife4j:
  enable: true    #开启knife4j，无需添加@EnableKnife4j注解
  setting:
    language: ZH_CN   # 中文:ZH_CN 英文:EN
    enable-swagger-models: true
    enable-dynamic-parameter: false
    footer-custom-content: "<strong>Copyright ?? 2026 Zhanyan. All Rights Reversed</strong>"
    enable-footer-custom: true
    enable-footer: true
    enable-document-manage: true

# Pexels API 配置
pexels:
  api-key: ${PEXELS_API_KEY:xxx}
# Nano Banana (Gemini 原生图片生成) 配置
nano-banana:
  api-key: xxx  # 请在 https://aistudio.google.com/apikey 获取
  model: gemini-3-pro-image-preview  # 可选: gemini-2.5-flash-image (快速), gemini-3-pro-image-preview (高质量)
  aspect-ratio: "16:9"  # 可选，支持 1:1, 2:3, 3:2, 3:4, 4:3, 4:5, 5:4, 9:16, 16:9, 21:9
  image-size: "1K"  # 可选（仅 gemini-3-pro 支持），支持 1K, 2K, 4K
  output-mime-type: image/png  # 可选，支持 image/jpeg, image/png
# Mermaid 图表生成配置
mermaid:
  cli-command: mmdc  # CLI 命令（Windows 下会自动使用 mmdc.cmd）
  background-color: transparent  # 背景颜色
  output-format: svg  # 输出格式（svg/png/pdf）
  width: 1200  # 图片宽度（像素）
  timeout: 30000  # 命令执行超时时间（毫秒）

# Iconify 图标库配置
iconify:
  api-url: https://api.iconify.design
  search-limit: 10
  default-height: 64
  default-color: ""  # 留空使用 currentColor，或设置如 "#000000"

# 表情包图片检索配置
emoji-pack:
  search-url: https://cn.bing.com/images/async
  suffix: 熊猫头表情包
  timeout: 10000  # 请求超时（毫秒）

# SVG 概念示意图生成配置
svg-diagram:
  default-width: 800
  default-height: 600
  folder: svg-diagrams  # COS 存储文件夹

# 文章智能体配置
article:
  agent:
    orchestrator:
      # 是否启用多智能体编排模式（支持配图并行生成）
      # true: 使用 Spring AI Alibaba 多智能体编排
      # false: 使用原有的 ArticleAgentService
      enabled: true
    # Agent 最大迭代次数
    max-iterations: 10

# 微信支付配置
wechat:
  pay:
    # 商户号 (请替换为实际商户号)
    mch-id: "your-mch-id"
    # 微信应用AppID (请替换为实际AppID)
    app-id: "your-app-id"
    # APIv3密钥 (请替换为实际密钥)
    api-key: "your-api-key"
    # 商户API证书序列号 (请替换为实际序列号)
    serial-no: "your-serial-no"
    # 商户私钥 (请替换为实际私钥)
    private-key: "your-private-key"
    # 支付回调地址 (需要公网可访问)
    notify-url: "https://your-domain.com/api/payment/notify"
    # 是否使用沙箱环境
    use-sandbox: false